services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: simapes-app
    container_name: simapes-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - simapes-network

  web:
    image: nginx:alpine
    container_name: simapes-web
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - simapes-network

  db:
    image: mysql:8.0
    container_name: simapes-db
    restart: unless-stopped
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-simapes}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-}
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    volumes:
      - simapes-db-data:/var/lib/mysql
    networks:
      - simapes-network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: simapes-phpmyadmin
    restart: unless-stopped
    ports:
      - "8085:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_PASSWORD:-}
    depends_on:
      - db
    networks:
      - simapes-network

networks:
  simapes-network:
    driver: bridge

volumes:
  simapes-db-data:
    driver: local
